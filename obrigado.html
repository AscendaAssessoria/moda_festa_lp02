    <meta charset="UTF-8">

    <title>Obrigado | Ascenda Assessoria</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        .thank-you-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            background: var(--bg-dark);
        }
        .thank-you-box {
            background: var(--bg-card);
            padding: 60px 40px;
            border-radius: 8px;
            border: 1px solid var(--primary-color);
            max-width: 600px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.5s ease-out;
        }
        .thank-you-icon {
            font-size: 60px;
            color: var(--primary-color);
            margin-bottom: 20px;
        }
        .thank-you-title {
            font-size: 2rem;
            margin-bottom: 15px;
            color: var(--text-main);
            font-family: var(--font-heading);
            font-weight: 600;
        }
        .thank-you-text {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            line-height: 1.6;
            font-family: var(--font-body);
        }
        .logo-img-tk {
            height: 45px;
            margin-bottom: 30px;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="dark-theme">
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KJM5HS4"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <section class="thank-you-section">
        <div class="thank-you-box">
            <img src="assets/logo.png" alt="Ascenda Assessoria" class="logo-img-tk">
            <div class="thank-you-icon">✓</div>
            <h1 class="thank-you-title">Recebemos seus dados!</h1>
            <p class="thank-you-text">Nossa equipe de especialistas já foi notificada. Fique atento(a) ao seu telefone/WhatsApp, pois <strong>entraremos em contato em alguns minutos</strong> para conversar sobre a sua loja.</p>
            <a href="index.html" class="btn btn-outline">Voltar para o site</a>
        </div>
    </section>
</body>
