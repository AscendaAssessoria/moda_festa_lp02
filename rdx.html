<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --rdx-black: #0d0d0d;
    --rdx-dark: #161616;
    --rdx-gold: #C9A24B;
    --rdx-gold-light: #D9B85F;
    --rdx-white: #F5F2EC;
    --rdx-gray: #b3b0aa;
  }

  html, body {
    height: 100%;
  }

  body {
    font-family: 'Montserrat', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(circle at 50% 35%, #1c1c1c 0%, var(--rdx-black) 70%);
    color: var(--rdx-white);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
    overflow-x: hidden;
  }

  .container {
    max-width: 620px;
    width: 100%;
    animation: fadeUp 0.9s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo {
    margin-bottom: 38px;
  }

  .logo svg {
    width: 84px;
    height: auto;
    display: block;
    margin: 0 auto 12px;
  }

  .logo .brand {
    font-size: 40px;
    font-weight: 800;
    letter-spacing: 6px;
    line-height: 1;
  }

  .logo .sub {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 4px;
    color: var(--rdx-gray);
    margin-top: 6px;
  }

  .check {
    width: 76px;
    height: 76px;
    margin: 0 auto 26px;
    border-radius: 50%;
    border: 2px solid var(--rdx-gold);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: pop 0.6s 0.3s ease both;
  }

  @keyframes pop {
    0% { transform: scale(0.4); opacity: 0; }
    70% { transform: scale(1.08); }
    100% { transform: scale(1); opacity: 1; }
  }

  .check svg {
    width: 38px;
    height: 38px;
  }

  h1 {
    font-size: clamp(30px, 7vw, 52px);
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 22px;
  }

  h1 .accent {
    color: var(--rdx-gold);
  }

  .divider {
    width: 64px;
    height: 3px;
    background: var(--rdx-gold);
    margin: 0 auto 26px;
    border-radius: 2px;
  }

  p {
    font-size: clamp(16px, 3.5vw, 19px);
    font-weight: 400;
    color: var(--rdx-gray);
    line-height: 1.6;
    max-width: 460px;
    margin: 0 auto;
  }

  .footer {
    margin-top: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
    flex-wrap: wrap;
  }

  .footer span {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--rdx-gray);
    text-transform: uppercase;
  }

  .footer span::before {
    content: "";
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--rdx-gold);
    border-radius: 50%;
    margin-right: 10px;
    vertical-align: middle;
  }
</style>
</head>
<body>

<div class="container">
  <div class="logo">
    <svg viewBox="0 0 100 70" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M50 4 L92 22 L50 40 L8 22 Z" fill="var(--rdx-white)"/>
      <path d="M8 36 L50 54 L92 36 L83 32 L50 47 L17 32 Z" fill="var(--rdx-gold)"/>
      <path d="M8 50 L50 68 L92 50 L83 46 L50 61 L17 46 Z" fill="var(--rdx-white)"/>
    </svg>
    <div class="brand">RDX</div>
    <div class="sub">ESQUADRIAS DE ALUMÍNIO</div>
  </div>

  <div class="check">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M5 13l4 4L19 7" stroke="var(--rdx-gold)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <h1>Obrigado pelas <span class="accent">informações</span></h1>
  <div class="divider"></div>
  <p>Recebemos seu cadastro com sucesso. Nossa equipe vai analisar suas informações e entrará em contato em breve. Por favor, fique atento(a) ao nosso contato!</p>

  <div class="footer">
    <span>Qualidade</span>
    <span>Compromisso</span>
    <span>Excelência</span>
  </div>
</div>
</body>
